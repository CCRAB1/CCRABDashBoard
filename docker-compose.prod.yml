#Verify the volume directories when deploying.

services:
  web:
    build:
      context: .
    restart: unless-stopped
    environment:
      DJANGO_IN_DOCKER: "True"
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-before-production}
      DATABASE_NAME: ${DATABASE_NAME:-xenia_db}
      DATABASE_USER: ${DATABASE_USER:-xenia_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-xenia_password}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: "${DATABASE_PORT:-5432}"
      DJANGO_WAIT_FOR_DB: "1"
      DJANGO_RUN_MIGRATIONS: "1"
      DJANGO_COLLECTSTATIC: "1"
    volumes:
      - static_data:/app/staticfiles
      - /Users/danramage/Documents/workspace/CCRAB/CCRABDashBoard/media:/app/media
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - static_data:/app/staticfiles:ro
      - /Users/danramage/Documents/workspace/CCRAB/CCRABDashBoard/media:/app/media:ro
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
    depends_on:
      web:
        condition: service_started

  # CERTBOT
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email your-email@example.com --agree-tos --no-eff-email --staging -d example.com -d www.example.com

volumes:
  static_data:
  certbot_www:
  certbot_etc:
