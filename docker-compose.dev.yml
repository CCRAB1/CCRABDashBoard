services:
  web:
    build:
      context: .
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_IN_DOCKER: "True"
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DATABASE_NAME: ${DATABASE_NAME:-xenia_db}
      DATABASE_USER: ${DATABASE_USER:-xenia_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-xenia_password}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: "${DATABASE_PORT:-5432}"
      DJANGO_WAIT_FOR_DB: "1"
      DJANGO_RUN_MIGRATIONS: "1"
      DJANGO_COLLECTSTATIC: "0"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_dev_data:
